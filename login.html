<!DOCTYPE html>
<html>
<head>
  <title>GigShield</title>
  <link rel="icon" href="logofav.png" type="image/jpeg">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      height: 25px; 
      justify-content: space-between;
      padding: 20px 40px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      height: 100%;
    }

    .logo img {
      max-height: 100px;   /* adjust if needed */
      object-fit: contain;
    }

    .navbar a {
      margin-left: 20px;
      text-decoration: none;
      color: #334155;
      font-weight: 500;
      height: 70px; 
    }

    .navbar a:hover {
      color: #2563eb;
    }

    /* MAIN LAYOUT */
    .main {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 85vh;
      padding: 20px;
    }
   

    /* LOGIN CARD */
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 330px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-bottom: 5px;
      color: #1e293b;
    }

    .card p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 20px;
    }

    .card input {
    width: 93%;
    padding: 8px 10px;   /* 🔥 reduced height */
    margin-bottom: 12px; /* tighter spacing */
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    font-size: 13px;
    }

    .card input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .card button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card button:hover {
      background: #1d4ed8;
      text-decoration: underline;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }

    .link a {
      color: #2563eb;
      text-decoration: underline;
    }

    /* IMAGE */
    .image img {
      width: 350px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #64748b;
      font-size: 13px;
    }

    .popup {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 20px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: 0.4s ease;
    z-index: 999;
    }

    .popup.show {
    top: 20px;
    }

    .popup-content {
    display: flex;
    align-items: center;
    gap: 10px;
    }

    #popup-icon {
    background: #22c55e;
    color: white;
    border-radius: 50%;
    padding: 8px 12px;
    font-weight: bold;
    }

    #popup-text {
    font-size: 14px;
    }

    /* RESPONSIVE */
    @media(max-width: 768px) {
      .main {
        flex-direction: column;
      }

      .image img {
        width: 250px;
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
        <img src="logo.png" alt="GigShield Logo">
    </div>
    <div>
      <a href="how-it-works.html">How It Works</a>
      <a href="#">Support</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LOGIN FORM -->
    <div class="card">
      <h2>Welcome Back 👋</h2>
      <p>Login to access your insurance dashboard</p>

      <input type="text" id="phone" placeholder="Email / Phone Number">
      <input type="password" id="password" placeholder="Password">

      <button onclick="login()">Login</button>

      <div class="link">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>

    <!-- IMAGE -->
    <div class="image">
      <img src="delivery-rider.png">
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function login() {
      const phone = document.getElementById("phone").value;
      const password = document.getElementById("password").value;

      if (phone === "" || password === "") {
        showPopup("Please fill all fields!", "error");
        return;
      }

      // TEMP LOGIN (replace with backend later)
      if (phone === "1234567890" && password === "1234") {
        showPopup("Login Successful");

        window.location.href = "dashboard.html";

      } else {
        showPopup("Invalid Credentials!", "error");
      }
    }
    function showPopup(message, type="success") {
    const popup = document.getElementById("popup");
    const text = document.getElementById("popup-text");
    const icon = document.getElementById("popup-icon");

    text.innerText = message;

    if(type === "error") {
        icon.style.background = "red";
        icon.innerText = "✖";
    } else {
        icon.style.background = "#22c55e";
        icon.innerText = "✔";
    }

    popup.classList.add("show");

    setTimeout(() => {
        popup.classList.remove("show");
    }, 2500);
    }
  </script>
  <div id="popup" class="popup">
  <div class="popup-content">
    <div id="popup-icon">✔</div>
    <p id="popup-text"></p>
  </div>
</div>

</body>
</html>
