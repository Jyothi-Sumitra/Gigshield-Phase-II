<!DOCTYPE html>
<html>
<head>
  <title>Support</title>
  <link rel="icon" href="logofav.png" type="image/jpeg">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f7fb;
    }

    /* NAVBAR */
    .navbar {
    height: 70px;        /* 🔥 controls navbar height */
    overflow: visible;   /* allow image to overflow */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 30px;  /* reduce this */
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      height: 100%;
    }
    
    .logo img {
        height: 120px;   /* adjust if needed */
        object-fit: contain;
        }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #334155;
    }

    /* HERO SECTION */
    .hero {
      background: linear-gradient(135deg, #5b3df5, #7c5cff);
      color: white;
      text-align: center;
      padding: 80px 20px 120px;
      position: relative;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .search-box {
      width: 60%;
      padding: 15px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    /* CURVE EFFECT */
    .hero::after {
    content: "";
    position: absolute;
    bottom: -30px;   /* 🔥 less push down */
    left: 0;
    width: 100%;
    height: 60px;    /* 🔥 reduce curve size */
    background: #f5f7fb;
    border-radius: 50% 50% 0 0;
    z-index: 1;
    }

    /* CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: -30px;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 250px;
      text-align: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      width: 60px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
      color: #64748b;
    }

    @media(max-width: 768px) {
      .cards {
        flex-direction: column;
        align-items: center;
      }

      .search-box {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="nav-links">
    <a href="login.html">Back</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>How can we help you?</h1>
  <input class="search-box" placeholder="Search for help...">
</div>

<!-- CARDS -->
<div class="cards">

  <div class="card">
    <a href="how-it-works.html"><h3>Getting Started</h3></a>
    <p>Learn how to register and set up your account.</p>
  </div>

  <div class="card">
    <h3>Insurance & Claims</h3>
    <p>Understand how payouts and protection work.</p>
  </div>

  <div class="card">
    <h3>Contact Support</h3>
    <p>Reach out to us for any help or issues.</p>
  </div>

</div>

</body>
</html>
